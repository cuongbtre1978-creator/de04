    { 
        type: "DD", 
        content: "Kéo thả đáp án đúng vào chỗ trống:<br>Nhiệt phân đến khối lượng không đổi 33,67 gam muối Ba(HCO<sub>3</sub>)<sub>2</sub> thu được V khí (đkc) và m gam rắn X. Giá trị của m là <span class='drop-zone' data-drop-id='d1'></span> gam (Làm tròn kết quả đến phần mười). Biết Ba=137, C=12, H=1, O=16.",
        drops: [{id: 'd1', correct: 't1'}],
        tokens: [{id: 't1', text: '19,9'}, {id: 't2', text: '19,7'}, {id: 't3', text: '15,3'}]
    }
];

let hoTen = "", lop = "";
let shuffledQuestions = [];
let currentIdx = 0;
let answers = {};
let daGuiDuLieu = false;
let isReviewMode = false;
const TONG_SO_CAU = db.length;
const inputName = document.getElementById('hoTen');
const inputLop = document.getElementById('lop');
const btnStart = document.getElementById('btnStart');

function checkInputs() {
    btnStart.disabled = !(inputName.value.trim().length > 1 && inputLop.value.trim().length >= 2);
}
inputName.addEventListener('input', checkInputs);
inputLop.addEventListener('input', checkInputs);

btnStart.addEventListener('click', () => {
    hoTen = inputName.value.trim();
    lop = inputLop.value.trim().toUpperCase().replace(/\s/g, '');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    initQuiz();
});

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function initQuiz() {
    shuffledQuestions = db.map((q, idx) => {
        let nq = JSON.parse(JSON.stringify(q));
        nq.originalIndex = idx;
        if(nq.type === "MCQ") {
            nq.dapAnDungGoc = nq.correct;
            nq.options = shuffle([...nq.options]);
        } else if(nq.type === "TF") {
            let origMap = {}; 
            q.statements.forEach(s => origMap[s.key] = s.correct);
            nq.dapAnDungGoc = origMap; 
            nq.statements = shuffle([...nq.statements]);
        } else if (nq.type === "SA") {
            nq.dapAnDungGoc = nq.correct;
        } else if (nq.type === "DD") {
            nq.tokens = shuffle([...nq.tokens]);
            let origMap = {}; 
            nq.drops.forEach(d => origMap[d.id] = d.correct);
            nq.dapAnDungGoc = origMap;
        }
        return nq;
    });
    shuffledQuestions = shuffle(shuffledQuestions);
    renderQuestion();
}

function checkAnswered(idx) {
    let q = shuffledQuestions[idx];
    if(!answers[idx]) return false;
    if(q.type === "MCQ" || q.type === "SA") return answers[idx] !== "";
    if(q.type === "TF") return Object.keys(answers[idx]).length === q.statements.length;
    if(q.type === "DD") return Object.keys(answers[idx]).length === q.drops.length;
    return false;
}

function handleInput() {
    if(isReviewMode) return;
    let q = shuffledQuestions[currentIdx];
    if(q.type === "MCQ") {
        let chk = document.querySelector(`input[name="q${currentIdx}"]:checked`);
        if(chk) answers[currentIdx] = chk.value;
    } else if(q.type === "TF") {
        if(!answers[currentIdx]) answers[currentIdx] = {};
        q.statements.forEach(s => {
            let chk = document.querySelector(`input[name="q${currentIdx}_${s.key}"]:checked`);
            if(chk) answers[currentIdx][s.key] = chk.value;
        });
    } else if(q.type === "SA") {
        let val = document.getElementById(`q${currentIdx}_sa`).value.trim();
        if(val !== "") answers[currentIdx] = val; else delete answers[currentIdx];
    } else if(q.type === "DD") {
        if(!answers[currentIdx]) answers[currentIdx] = {};
        q.drops.forEach(d => {
            let dz = document.querySelector(`[data-drop-id="${d.id}"]`);
            if (dz && dz.querySelector('.drag-token')) answers[currentIdx][d.id] = dz.querySelector('.drag-token').getAttribute('data-id');
            else delete answers[currentIdx][d.id];
        });
    }
    renderControls();
}

function renderQuestion() {
    let q = shuffledQuestions[currentIdx];
    let ctn = document.getElementById('question-container');
    let html = `<div class="question-title">Câu ${currentIdx + 1} / ${TONG_SO_CAU}</div>
                <div class="question-content">${q.content}</div>`;
                
    if(q.type === "MCQ") {
        html += `<ul class="options-list">`;
        q.options.forEach(opt => {
            let checked = (answers[currentIdx] === opt.key) ? 'checked' : '';
            let disabled = isReviewMode ? 'disabled' : '';
            let rCls = isReviewMode ? (opt.key === q.dapAnDungGoc ? "review-correct" : (answers[currentIdx] === opt.key ? "review-incorrect" : "")) : "";
            html += `<li class="option-item"><label for="q${currentIdx}_${opt.key}" class="${rCls}"><input type="radio" name="q${currentIdx}" value="${opt.key}" id="q${currentIdx}_${opt.key}" ${checked} ${disabled} onchange="handleInput()"><span>${opt.text}</span></label></li>`;
        });
        html += `</ul>`;
    } else if(q.type === "TF") {
        html += `<table class="tf-table"><tr><th>Phát biểu</th><th>Đúng</th><th>Sai</th></tr>`;
        q.statements.forEach(s => {
            let cD = (answers[currentIdx] && answers[currentIdx][s.key] === "D") ? 'checked' : '';
            let cS = (answers[currentIdx] && answers[currentIdx][s.key] === "S") ? 'checked' : '';
            let disabled = isReviewMode ? 'disabled' : '';
            let rD = isReviewMode ? (q.dapAnDungGoc[s.key] === "D" ? "review-correct" : (cD ? "review-incorrect" : "")) : "";
            let rS = isReviewMode ? (q.dapAnDungGoc[s.key] === "S" ? "review-correct" : (cS ? "review-incorrect" : "")) : "";
            html += `<tr><td class="tf-stmt">${s.text}</td><td class="${rD}"><input type="radio" name="q${currentIdx}_${s.key}" value="D" ${cD} ${disabled} onchange="handleInput()"></td><td class="${rS}"><input type="radio" name="q${currentIdx}_${s.key}" value="S" ${cS} ${disabled} onchange="handleInput()"></td></tr>`;
        });
        html += `</table>`;
    } else if(q.type === "SA") {
        let val = answers[currentIdx] || "";
        let disabled = isReviewMode ? 'disabled' : '';
        let rCls = "", corrS = "";
        if(isReviewMode) {
            let isC = val.toString().toLowerCase() === q.dapAnDungGoc.toString().toLowerCase();
            rCls = isC ? "review-correct" : "review-incorrect";
            if(!isC) corrS = `<div class="correction">Đáp án đúng: ${q.dapAnDungGoc}</div>`;
        }
        html += `<div style="text-align:center;"><input type="text" id="q${currentIdx}_sa" class="short-ans-input ${rCls}" value="${val}" ${disabled} oninput="handleInput()" placeholder="..."> ${corrS}</div>`;
    } else if(q.type === "DD") {
        let tokensHtml = `<div class="drag-container" id="token-container-${currentIdx}">`;
        q.tokens.forEach(t => {
            let isP = false; 
            if(answers[currentIdx]) Object.values(answers[currentIdx]).forEach(v => { if(v === t.id) isP = true; });
            if(!isP) tokensHtml += `<div class="drag-token" data-id="${t.id}">${t.text}</div>`;
        });
        tokensHtml += `</div>`;
        html = html.replace('</div>', '</div>' + tokensHtml);
    }
    
    ctn.innerHTML = html;
    
    if(q.type === "DD") {
        q.drops.forEach(d => {
            let dz = document.querySelector(`[data-drop-id="${d.id}"]`);
            if(isReviewMode) {
                let ansId = answers[currentIdx] ? answers[currentIdx][d.id] : null;
                if(ansId === d.correct) dz.classList.add('review-correct');
                else { dz.classList.add('review-incorrect'); dz.insertAdjacentHTML('afterend', `<span class="correction">${q.tokens.find(t=>t.id===d.correct).text}</span>`); }
            }
            if(answers[currentIdx] && answers[currentIdx][d.id]) {
                let tId = answers[currentIdx][d.id], tObj = q.tokens.find(t => t.id === tId);
                if(tObj) dz.innerHTML = `<div class="drag-token" data-id="${tObj.id}">${tObj.text}</div>`;
            }
        });
        if(!isReviewMode) initDragDrop();
    }
    renderControls();
}

let selectedToken = null;
function initDragDrop() {
    const container = document.querySelector('.drag-container');
    const tokens = document.querySelectorAll('.drag-token');
    const zones = document.querySelectorAll('.drop-zone');
    
    function attachTokenEvent(t) {
        t.onclick = (e) => {
            if(isReviewMode) return;
            e.stopPropagation();
            
            if(t.parentElement.classList.contains('drop-zone')) {
                container.appendChild(t);
                t.classList.remove('selected');
                selectedToken = null;
                handleInput();
                return;
            }
            if(selectedToken) selectedToken.classList.remove('selected');
            if(selectedToken === t) selectedToken = null;
            else { selectedToken = t; t.classList.add('selected'); }
        };
    }
    tokens.forEach(attachTokenEvent);
    
    zones.forEach(z => {
        z.onclick = () => {
            if(isReviewMode) return;
            if(selectedToken) {
                if(z.hasChildNodes()) container.appendChild(z.firstChild);
                z.appendChild(selectedToken);
                selectedToken.classList.remove('selected');
                selectedToken = null;
                handleInput();
            } 
            else if(z.hasChildNodes()) {
                container.appendChild(z.firstChild);
                handleInput();
            }
        };
    });
}

function renderControls() {
    let ctrl = document.getElementById('controls'); ctrl.innerHTML = '';
    let btnPrev = document.createElement('button'); btnPrev.innerText = 'Câu trước'; btnPrev.style.background = '#78909c'; btnPrev.disabled = currentIdx === 0;
    btnPrev.onclick = () => { currentIdx--; renderQuestion(); }; ctrl.appendChild(btnPrev);
    
    if(currentIdx < TONG_SO_CAU - 1) {
        let btnNext = document.createElement('button'); btnNext.innerText = 'Câu tiếp theo'; btnNext.disabled = !checkAnswered(currentIdx) && !isReviewMode;
        btnNext.onclick = () => { currentIdx++; renderQuestion(); }; ctrl.appendChild(btnNext);
    } else if(!isReviewMode) {
        let btnSub = document.createElement('button'); btnSub.innerText = 'Nộp bài'; btnSub.style.background = '#e91e63'; btnSub.disabled = !checkAnswered(currentIdx) || daGuiDuLieu;
        btnSub.onclick = submitTest; ctrl.appendChild(btnSub);
    }
}

function calculateScore() {
    let diem = 0, soDung = 0;
    shuffledQuestions.forEach((q, i) => {
        let ans = answers[i]; if(!ans) return;
        if(q.type === "MCQ") { if(ans === q.dapAnDungGoc) { diem += 0.4; soDung++; } }
        else if(q.type === "TF") {
            let sub = 0; Object.keys(q.dapAnDungGoc).forEach(k => { if(ans[k] === q.dapAnDungGoc[k]) sub++; });
            if(sub === 4) { diem += 0.5; soDung++; } else if(sub === 3) diem += 0.25; else if(sub === 2) diem += 0.1;
        } else if(q.type === "SA") { if(ans.toString().toLowerCase() === q.dapAnDungGoc.toString().toLowerCase()) { diem += 0.3; soDung++; } }
        else if(q.type === "DD") { if(Object.keys(q.dapAnDungGoc).every(k => ans[k] === q.dapAnDungGoc[k])) { diem += 0.35; soDung++; } }
    });
    return { diem: Math.min(10, Math.round(diem * 10) / 10), soDung };
}

async function submitTest() {
    if(daGuiDuLieu) return; daGuiDuLieu = true;
    let res = calculateScore();
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('infoBoard').innerHTML = `Học sinh: <b>${hoTen}</b> | Lớp: <b>${lop}</b><br>Thời gian nộp: ${new Date().toLocaleString('vi-VN')}`;
    document.getElementById('rs-diem').innerText = res.diem;
    document.getElementById('rs-dung').innerText = res.soDung;
    document.getElementById('rs-sai').innerText = TONG_SO_CAU - res.soDung;
    
    let sts = document.getElementById('saveStatus'); sts.innerText = 'Đang gửi kết quả lên hệ thống...';
    let scriptUrl = SCRIPT_URLS[lop] || SCRIPT_URLS["12A5"];
    try {
        await fetch(scriptUrl, { method: "POST", mode: 'no-cors', headers: { "Content-Type": "application/json" }, body: JSON.stringify({ hoTen, lop, diem: res.diem, soDung: res.soDung, tongSoCau: TONG_SO_CAU }) });
        sts.innerHTML = '<span style="color: #4CAF50;">    ✅     Đã lưu kết quả thành công!</span>';
        document.getElementById('btnReview').classList.remove('hidden'); document.getElementById('btnRestart').classList.remove('hidden');
    } catch(e) {
        sts.innerHTML = '<span style="color: #f44336;">    ⚠️     Không thể kết nối server, nhưng điểm đã được ghi nhận.</span>';
        document.getElementById('btnReview').classList.remove('hidden');
    }
}

document.getElementById('btnReview').onclick = () => { isReviewMode = true; currentIdx = 0; document.getElementById('result-screen').classList.add('hidden'); document.getElementById('quiz-screen').classList.remove('hidden'); renderQuestion(); };
document.getElementById('btnRestart').onclick = () => location.reload();
</script>
</body>
</html>
